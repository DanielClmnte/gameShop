<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Búsqueda</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/catalogo.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">🎮 GameShop</a>
            <nav>
                <a href="/">Inicio</a>
                <a href="/catalogo/disponibles">Disponibles</a>
                <a href="/catalogo/populares">Populares</a>
                <a href="/carrito">🛒 Carrito</a>
                <span th:if="${session.usuarioNombre != null}" style="color:#00d4ff;">👤 <span th:text="${session.usuarioNombre}"></span></span>
                <a th:if="${session.usuarioId != null}" href="/pedidos">Mis Pedidos</a>
                <a th:if="${session.usuarioRol == 'ADMIN'}" href="/admin">Admin</a>
                <a th:if="${session.usuarioId != null}" href="/logout" style="color:#ff3333;">Cerrar Sesión</a>
                <a th:unless="${session.usuarioId != null}" href="/login">Login</a>
            </nav>
            <form action="/catalogo/buscar" method="get" class="search-bar">
                <input type="text" name="titulo" placeholder="Buscar videojuego..." required>
                <button type="submit">Buscar</button>
            </form>
        </div>
    </header>

    <div class="container">
        <h1>Resultados de búsqueda</h1>

        <div class="busqueda-info" th:text="${'Búsqueda: ' + terminoBusqueda + ' (' + videojuegos.size() + ' resultados)'}"></div>

        <div th:if="${videojuegos.size() > 0}" class="videojuegos">
            <div class="videojuego-card" th:each="videojuego : ${videojuegos}">
                <div class="videojuego-imagen">
                    <span th:text="${videojuego.imagen}"></span>
                </div>
                <div class="videojuego-info">
                    <h3 th:text="${videojuego.titulo}"></h3>
                    <div class="videojuego-precio" th:text="${'€' + #numbers.formatDecimal(videojuego.precio, 1, 2)}"></div>
                    <div class="videojuego-botones">
                        <button class="btn-carrito" th:onclick="'agregarAlCarrito(' + ${videojuego.id} + ')'">Añadir al carrito</button>
                    </div>
                </div>
            </div>
        </div>

        <div th:unless="${videojuegos.size() > 0}" class="sin-resultados">
            <p>No se encontraron videojuegos con ese término de búsqueda.</p>
            <p style="margin-top: 20px;"><a href="/" style="color: #00d4ff;">Volver al catálogo</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 GameShop - Tienda de Videojuegos. Desarrollado por Daniel Clemente</p>
    </footer>

    <script>
        function agregarAlCarrito(videojuegoId) {
            alert('Videojuego ' + videojuegoId + ' agregado al carrito (funcionalidad en desarrollo)');
        }
    </script>
</body>
</html>
