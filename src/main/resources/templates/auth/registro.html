<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Registro</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container">
        <div class="auth-layout">
            <div class="auth-card">
                <h1>✍️ Crear Cuenta</h1>

                <!-- Mensaje de error -->
                <div th:if="${error}" class="alert alert-error">
                    <p th:text="${error}"></p>
                </div>

                <form method="post" action="/registro" class="auth-form">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required th:value="${nombre}">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required th:value="${email}">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono (Opcional)</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+34 666 123 456">
                    </div>

                    <div class="form-group">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" placeholder="Mínimo 4 caracteres" required minlength="4">
                        <small style="color:var(--text-muted);font-size:12px;">Usa al menos 4 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="contrasenaRepetida">Repetir Contraseña</label>
                        <input type="password" id="contrasenaRepetida" name="contrasenaRepetida" placeholder="Repite tu contraseña" required minlength="4">
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" required>
                            <span>Acepto los términos y condiciones</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-auth">Crear Cuenta</button>
                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
                </div>
            </div>

            <div class="auth-banner">
                <div class="auth-banner-icon">🚀</div>
                <div class="auth-banner-text">Únete a la comunidad</div>
                <p style="color: var(--text-secondary); margin-top: 12px; font-size: 15px; position:relative; z-index:1;">Miles de juegos te están esperando</p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
