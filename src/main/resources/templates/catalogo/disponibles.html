<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Disponibles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/catalogo.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Inicio</a> <span>›</span> <span>Disponibles</span>
        </div>

        <div class="section-header">
            <h1 class="page-title page-title-no-margin">Juegos <span class="highlight">Disponibles</span></h1>
            <a href="/" class="btn btn-ghost btn-sm">← Volver al Inicio</a>
        </div>

        <div class="games-grid">
            <div class="game-card" th:each="videojuego : ${videojuegos}">
                <div class="game-card-img">
                    <img th:src="${videojuego.imagen}" th:alt="${videojuego.titulo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="img-fallback">🎮</div>
                    <div class="game-card-badge" th:if="${videojuego.calificacion >= 4.5}">⭐ TOP</div>
                    <div class="game-card-platform-tag"
                         th:text="${videojuego.plataformaId == 1 ? 'PS5' : (videojuego.plataformaId == 2 ? 'XBOX' : 'PC')}">PC</div>
                    <div class="game-card-overlay">
                        <a th:href="@{/producto/{id}(id=${videojuego.id})}" class="btn btn-primary btn-sm">Ver detalles</a>
                    </div>
                </div>
                <div class="game-card-body">
                    <div class="game-card-title" th:text="${videojuego.titulo}"></div>
                    <div class="game-card-meta">
                        <span class="game-card-rating" th:text="${'⭐ ' + #numbers.formatDecimal(videojuego.calificacion, 1, 1)}"></span>
                        <span class="game-card-stock-inline">
                            <span class="stock-dot stock-dot-green"></span>
                            <span class="stock-text-sm">En stock</span>
                        </span>
                    </div>
                    <div class="game-card-footer">
                        <span class="game-card-price" th:text="${'€' + #numbers.formatDecimal(videojuego.precio, 1, 2)}"></span>
                        <div class="game-card-actions">
                            <a th:href="@{/producto/{id}(id=${videojuego.id})}" class="btn btn-ghost btn-sm">Ver</a>
                            <form th:action="@{/carrito/agregar/{id}(id=${videojuego.id})}" method="post">
                                <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-basket-shopping"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════ PAGINACIÓN ═══════ -->
        <div th:replace="~{fragments/layout :: pagination(${pagina}, ${baseUrl})}"></div>
    </div>
    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
