<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<body>

<!-- ═══════════════ HEADER ADMIN ═══════════════ -->
<header th:fragment="header-admin" class="site-header header-admin">
    <div class="header-container">
        <a href="/" class="logo">
            <span class="logo-icon">🎮</span>
            <span class="logo-text">Game<span class="logo-accent">Shop</span></span>
            <span class="admin-badge">ADMIN</span>
        </a>

        <nav class="nav-main" id="navMain">
            <a href="/admin" class="nav-link">Dashboard</a>
            <a href="/admin/productos" class="nav-link">Productos</a>
            <a href="/admin/stock" class="nav-link">Stock</a>
            <a href="/admin/usuarios" class="nav-link">Usuarios</a>
            <a href="/" class="nav-link">Ver Tienda</a>
        </nav>

        <div class="header-actions">
            <div class="user-area" th:if="${session.usuarioId != null}">
                <span class="user-avatar">👤</span>
                <span class="user-name" th:text="${session.usuarioNombre}">Admin</span>
                <a href="/logout" class="nav-link nav-logout">Salir</a>
            </div>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="Menú">☰</button>
    </div>
</header>

</body>
</html>
