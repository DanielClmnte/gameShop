<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Checkout</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .checkout-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .checkout-form {
            background-color: #1a1a2e;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 30px;
        }

        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .form-section h2 {
            color: #00d4ff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #00d4ff;
            font-weight: bold;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            background-color: #0f3460;
            border: 1px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            background-color: #16213e;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .btn-procesar {
            width: 100%;
            padding: 15px;
            background-color: #00ff00;
            color: #0a0a0a;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .btn-procesar:hover {
            background-color: #00cc00;
        }

        .resumen-pedido {
            background-color: #1a1a2e;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 25px;
            position: sticky;
            top: 100px;
        }

        .resumen-pedido h2 {
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .item-resumen {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .item-resumen strong {
            color: #00d4ff;
        }

        .resumen-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            margin-top: 15px;
            border-top: 2px solid #00d4ff;
            font-size: 18px;
            font-weight: bold;
            color: #00ff00;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
            }

            .resumen-pedido {
                position: static;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">🎮 GameShop</a>
            <nav>
                <a href="/">Catálogo</a>
                <a href="/carrito">🛒 Carrito</a>
                <a href="/logout">Cerrar Sesión</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center; color: #00d4ff; margin: 40px 0;">💳 Checkout</h1>

        <div class="checkout-container">
            <!-- FORMULARIO DE CHECKOUT -->
            <form method="post" action="/checkout/procesar" class="checkout-form">
                <input type="hidden" name="usuarioId" th:value="${usuarioId}">

                <!-- DATOS PERSONALES -->
                <div class="form-section">
                    <h2>Datos Personales</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombreCompleto">Nombre Completo *</label>
                            <input type="text" id="nombreCompleto" name="nombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>
                </div>

                <!-- DIRECCIÓN DE ENVÍO -->
                <div class="form-section">
                    <h2>Dirección de Envío</h2>
                    <div class="form-group">
                        <label for="direccion">Dirección *</label>
                        <input type="text" id="direccion" name="direccion" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ciudad">Ciudad *</label>
                            <input type="text" id="ciudad" name="ciudad" required>
                        </div>
                        <div class="form-group">
                            <label for="codigoPostal">Código Postal *</label>
                            <input type="text" id="codigoPostal" name="codigoPostal" required>
                        </div>
                    </div>
                </div>

                <!-- DATOS DE PAGO -->
                <div class="form-section">
                    <h2>Información de Pago</h2>
                    <div class="form-group">
                        <label for="numeroTarjeta">Número de Tarjeta (16 dígitos) *</label>
                        <input type="text" id="numeroTarjeta" name="numeroTarjeta" placeholder="1234 5678 9012 3456" maxlength="16" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mesExpiracion">Mes Expiración *</label>
                            <select id="mesExpiracion" name="mesExpiracion" required>
                                <option value="">Selecciona mes</option>
                                <option value="01">01 - Enero</option>
                                <option value="02">02 - Febrero</option>
                                <option value="03">03 - Marzo</option>
                                <option value="04">04 - Abril</option>
                                <option value="05">05 - Mayo</option>
                                <option value="06">06 - Junio</option>
                                <option value="07">07 - Julio</option>
                                <option value="08">08 - Agosto</option>
                                <option value="09">09 - Septiembre</option>
                                <option value="10">10 - Octubre</option>
                                <option value="11">11 - Noviembre</option>
                                <option value="12">12 - Diciembre</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="anioExpiracion">Año Expiración *</label>
                            <input type="text" id="anioExpiracion" name="anioExpiracion" placeholder="YYYY" maxlength="4" required>
                        </div>
                        <div class="form-group">
                            <label for="cvv">CVV (3 dígitos) *</label>
                            <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3" required>
                        </div>
                    </div>
                    <p style="color: #b0b0b0; font-size: 12px; margin-top: 10px;">
                        💡 Datos de prueba: 1234567890123456 / 12 / 2025 / 123
                    </p>
                </div>

                <button type="submit" class="btn-procesar">Procesar Pago</button>
            </form>

            <!-- RESUMEN DEL PEDIDO -->
            <div class="resumen-pedido">
                <h2>Resumen del Pedido</h2>

                <div th:each="item : ${items}" class="item-resumen">
                    <span>
                        <strong th:text="${item.tituloVideojuego}"></strong><br>
                        <small style="color: #b0b0b0;" th:text="${'x ' + item.cantidad}"></small>
                    </span>
                    <span th:text="${'€' + #numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                </div>

                <div style="padding: 10px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; color: #b0b0b0;">
                    <span>Subtotal:</span>
                    <span th:text="${'€' + #numbers.formatDecimal(total, 1, 2)}"></span>
                </div>

                <div style="padding: 10px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; color: #ffc107;">
                    <span>Impuestos (21%):</span>
                    <span th:text="${'€' + #numbers.formatDecimal(impuestos, 1, 2)}"></span>
                </div>

                <div class="resumen-total">
                    <span>Total:</span>
                    <span th:text="${'€' + #numbers.formatDecimal(totalConImpuestos, 1, 2)}"></span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 GameShop - Tienda de Videojuegos. Desarrollado por Daniel Clemente</p>
    </footer>
</body>
</html>
