<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f3f3; }
        .navbar-tienda {
            background-color: #131921;
            padding: 10px 20px;
        }
        .navbar-tienda h1 {
            color: #ff9900;
            font-size: 1.6rem;
            margin: 0;
            font-weight: 700;
        }
        .form-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 30px;
            max-width: 560px;
            margin: 30px auto;
        }
        .form-card h2 {
            font-weight: 700;
            margin-bottom: 24px;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 8px;
        }
        .btn-guardar {
            background-color: #ff9900;
            border: none;
            color: #000;
            font-weight: 700;
        }
        .btn-guardar:hover { background-color: #e68a00; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar-tienda mb-4">
    <div class="container">
        <h1>🛒 Mi Tienda</h1>
    </div>
</nav>

<div class="container">
    <div class="form-card">

        <!-- ✅ CORREGIDO: texto y rutas cambiados de cliente → producto -->
        <h2 th:text="${producto.id == 0} ? 'Agregar Producto' : 'Editar Producto'"></h2>

        <!-- ✅ CORREGIDO: th:object y rutas apuntan a producto -->
        <form th:action="${producto.id == 0} ? @{/productos/crear} : @{/productos/modificar}"
              th:object="${producto}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}"/>

            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre</label>
                <input type="text" class="form-control" th:field="*{nombre}" required
                       placeholder="Ej: Auriculares Bluetooth">
            </div>

            <!-- ✅ CORREGIDO: campo tipoProducto (String), eliminados dni/email/tipoClienteId -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Tipo de Producto</label>
                <input type="text" class="form-control" th:field="*{tipoProducto}" required
                       placeholder="Ej: Electrónica, Ropa, Hogar...">
            </div>

            <!-- ✅ CORREGIDO: campo precio (double), sustituye a unidades -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Precio (€)</label>
                <div class="input-group">
                    <input type="number" step="0.01" min="0" class="form-control"
                           th:field="*{precio}" required placeholder="0.00">
                    <span class="input-group-text">€</span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Imagen del Producto</label>
                <input type="file" name="file" class="form-control" accept="image/*">
                <!-- Muestra la imagen actual si existe -->
                <div th:if="${producto.imagen != null and !producto.imagen.isEmpty()}" class="mt-2">
                    <small class="text-muted">Imagen actual:</small><br>
                    <img th:src="@{'/images/' + ${producto.imagen}}"
                         height="80" style="object-fit:contain; border:1px solid #ddd; border-radius:4px; padding:4px;">
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-guardar flex-grow-1">💾 Guardar</button>
                <!-- ✅ CORREGIDO: href apunta a /productos -->
                <a href="/productos" class="btn btn-outline-secondary flex-grow-1">✖ Cancelar</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
