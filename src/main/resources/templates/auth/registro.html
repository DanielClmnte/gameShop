<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Registro</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">🎮 GameShop</a>
            <nav>
                <a href="/">Inicio</a>
                <a href="/catalogo/disponibles">Disponibles</a>
                <a href="/catalogo/populares">Populares</a>
                <a href="/carrito">🛒 Carrito</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="auth-container">
            <div class="auth-form registro-form">
                <h1>✍️ Crear Cuenta</h1>

                <!-- Mensaje de error -->
                <div th:if="${error}" class="alert alert-error">
                    <p th:text="${error}"></p>
                </div>

                <form method="post" action="/registro">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required th:value="${nombre}">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required th:value="${email}">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono (Opcional)</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+34 666 123 456">
                    </div>

                    <div class="form-group">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" placeholder="Mínimo 4 caracteres" required minlength="4">
                        <small>Usa al menos 4 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="contrasenaRepetida">Repetir Contraseña</label>
                        <input type="password" id="contrasenaRepetida" name="contrasenaRepetida" placeholder="Repite tu contraseña" required minlength="4">
                    </div>

                    <div class="form-opciones">
                        <label class="checkbox">
                            <input type="checkbox" required>
                            <span>Acepto los términos y condiciones</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">Crear Cuenta</button>
                </form>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
                </div>
            </div>

            <div class="auth-imagen">
                <div class="imagen-placeholder">
                    <p>🚀</p>
                    <p>Únete a la comunidad</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 GameShop - Tienda de Videojuegos. Desarrollado por Daniel Clemente</p>
    </footer>
</body>
</html>
