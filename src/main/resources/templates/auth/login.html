<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Login</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container">
        <div class="auth-layout">
            <div class="auth-card">
                <h1>🔐 Inicia Sesión</h1>

                <!-- Mensaje de error -->
                <div th:if="${error}" class="alert alert-error">
                    <p th:text="${error}"></p>
                </div>

                <form method="post" action="/login" class="auth-form">
                    <input type="hidden" name="redirect" th:value="${redirect}">
                    <div class="form-group">
                        <label for="email">Usuario o Email</label>
                        <input type="text" id="email" name="email" placeholder="Nombre de usuario o email" required>
                    </div>

                    <div class="form-group">
                        <label for="contrasena">Contraseña</label>
                        <input type="password" id="contrasena" name="contrasena" placeholder="••••••••" required>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" name="recuerdame">
                            <span>Recuérdame</span>
                        </label>
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-auth">Inicia Sesión</button>
                </form>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="/registro">Regístrate aquí</a></p>
                </div>

                <!-- Datos de prueba -->
                <div class="test-data">
                    <h4>📝 Datos de prueba:</h4>
                    <p><strong>Admin:</strong> admin / admin</p>
                    <p><strong>Usuario 1:</strong> juan@example.com / pass123</p>
                    <p><strong>Usuario 2:</strong> maria@example.com / pass456</p>
                </div>
            </div>

            <div class="auth-banner">
                <div class="auth-banner-icon">🎮</div>
                <div class="auth-banner-text">Bienvenido a GameShop</div>
                <p style="color: var(--text-secondary); margin-top: 12px; font-size: 15px;">Tu tienda de videojuegos favorita</p>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
