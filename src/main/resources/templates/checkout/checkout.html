<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">GameShop - Checkout</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/checkout.css}">
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container">
        <div class="breadcrumb">
            <a href="/">Inicio</a> <span>›</span> <a href="/carrito">Carrito</a> <span>›</span> <span>Checkout</span>
        </div>

        <h1 class="page-title" style="text-align: center;">💳 <span class="highlight">Checkout</span></h1>

        <div class="checkout-container">
            <!-- FORMULARIO DE CHECKOUT -->
            <form method="post" action="/checkout/procesar" class="checkout-form">
                <!-- usuarioId viene de la sesión HTTP, no hace falta campo oculto -->

                <!-- DATOS PERSONALES -->
                <div class="form-section">
                    <h2>Datos Personales</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombreCompleto">Nombre Completo *</label>
                            <input type="text" id="nombreCompleto" name="nombreCompleto" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>
                </div>

                <!-- DIRECCIÓN DE ENVÍO -->
                <div class="form-section">
                    <h2>Dirección de Envío</h2>
                    <div class="form-group">
                        <label for="direccion">Dirección *</label>
                        <input type="text" id="direccion" name="direccion" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ciudad">Ciudad *</label>
                            <input type="text" id="ciudad" name="ciudad" required>
                        </div>
                        <div class="form-group">
                            <label for="codigoPostal">Código Postal *</label>
                            <input type="text" id="codigoPostal" name="codigoPostal" required>
                        </div>
                    </div>
                </div>

                <!-- DATOS DE PAGO -->
                <div class="form-section">
                    <h2>Información de Pago</h2>
                    <div class="form-group">
                        <label for="numeroTarjeta">Número de Tarjeta (16 dígitos) *</label>
                        <input type="text" id="numeroTarjeta" name="numeroTarjeta" placeholder="1234 5678 9012 3456" maxlength="16" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="mesExpiracion">Mes Expiración *</label>
                            <select id="mesExpiracion" name="mesExpiracion" required>
                                <option value="">Selecciona mes</option>
                                <option value="01">01 - Enero</option>
                                <option value="02">02 - Febrero</option>
                                <option value="03">03 - Marzo</option>
                                <option value="04">04 - Abril</option>
                                <option value="05">05 - Mayo</option>
                                <option value="06">06 - Junio</option>
                                <option value="07">07 - Julio</option>
                                <option value="08">08 - Agosto</option>
                                <option value="09">09 - Septiembre</option>
                                <option value="10">10 - Octubre</option>
                                <option value="11">11 - Noviembre</option>
                                <option value="12">12 - Diciembre</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="anioExpiracion">Año Expiración *</label>
                            <input type="text" id="anioExpiracion" name="anioExpiracion" placeholder="YYYY" maxlength="4" required>
                        </div>
                        <div class="form-group">
                            <label for="cvv">CVV (3 dígitos) *</label>
                            <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="3" required>
                        </div>
                    </div>
                    <p class="checkout-hint">
                        💡 Datos de prueba: 1234567890123456 / 12 / 2025 / 123
                    </p>
                </div>

                <button type="submit" class="btn-procesar">Procesar Pago</button>
            </form>

            <!-- RESUMEN DEL PEDIDO -->
            <div class="resumen-pedido">
                <h2>Resumen del Pedido</h2>

                <div th:each="item : ${items}" class="item-resumen">
                    <span>
                        <strong th:text="${item.tituloVideojuego}"></strong><br>
                        <small th:text="${'x ' + item.cantidad}"></small>
                    </span>
                    <span th:text="${'€' + #numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                </div>

                <div class="item-resumen" style="color:var(--text-secondary);">
                    <span>Subtotal:</span>
                    <span th:text="${'€' + #numbers.formatDecimal(total, 1, 2)}"></span>
                </div>

                <div class="item-resumen" style="color:var(--yellow);">
                    <span>Impuestos (21%):</span>
                    <span th:text="${'€' + #numbers.formatDecimal(impuestos, 1, 2)}"></span>
                </div>

                <div class="resumen-total">
                    <span>Total:</span>
                    <span th:text="${'€' + #numbers.formatDecimal(totalConImpuestos, 1, 2)}"></span>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
