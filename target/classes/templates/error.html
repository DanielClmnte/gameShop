<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f3f3; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <div class="card shadow-sm border-danger">
                <div class="card-body p-5">
                    <h1 class="display-4 text-danger mb-4">⚠️</h1>
                    <h2 class="text-danger mb-3">¡Vaya! Ha ocurrido un error</h2>

                    <p class="lead text-muted">
                        Lo sentimos, algo no ha salido como esperábamos.
                        Por favor, vuelve a la página principal e inténtalo de nuevo.
                    </p>

                    <hr class="my-4">

                    <!-- ✅ CORREGIDO: href cambiado de /clientes a /productos -->
                    <a href="/productos" class="btn btn-primary btn-lg">
                        Volver a la página principal
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
