<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f3f3; }

        .navbar-tienda {
            background-color: #131921;
            padding: 10px 20px;
        }
        .navbar-tienda h1 {
            color: #ff9900;
            font-size: 1.6rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .product-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s;
        }
        .product-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .product-img-wrapper {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            background-color: #f8f8f8;
            border-radius: 6px;
            overflow: hidden;
        }
        .product-img-wrapper img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }
        .product-img-placeholder {
            font-size: 3rem;
            color: #ccc;
        }
        .product-tipo {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .product-nombre {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            flex-grow: 1;
        }
        .product-precio {
            font-size: 1.4rem;
            font-weight: 700;
            color: #B12704;
            margin-bottom: 12px;
        }
        .product-precio span {
            font-size: 0.85rem;
            font-weight: 400;
            color: #888;
        }
        .btn-acciones {
            display: flex;
            gap: 6px;
        }
        .btn-editar {
            background-color: #ff9900;
            border: none;
            color: #000;
            font-size: 0.8rem;
            font-weight: 600;
            flex: 1;
        }
        .btn-editar:hover { background-color: #e68a00; }
        .btn-eliminar {
            background-color: #fff;
            border: 1px solid #cc0000;
            color: #cc0000;
            font-size: 0.8rem;
            font-weight: 600;
            flex: 1;
        }
        .btn-eliminar:hover { background-color: #cc0000; color: #fff; }

        .seccion-titulo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #131921;
            border-bottom: 2px solid #ff9900;
            padding-bottom: 6px;
            margin-bottom: 20px;
        }

        .btn-agregar {
            background-color: #ff9900;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 8px 20px;
        }
        .btn-agregar:hover { background-color: #e68a00; }
    </style>
</head>
<body>

<!-- Navbar estilo Amazon -->
<nav class="navbar-tienda mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h1>🛒 Mi Tienda</h1>
        <a href="/productos/nuevo" class="btn btn-agregar">+ Agregar Producto</a>
    </div>
</nav>

<div class="container pb-5">

    <!-- Grid de productos: 4 por fila -->
    <div class="seccion-titulo">Todos los productos</div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-3">
        <div class="col" th:each="producto : ${productos}">
            <div class="product-card">

                <!-- Imagen -->
                <div class="product-img-wrapper">
                    <img th:if="${producto.imagen != null and !producto.imagen.isEmpty()}"
                         th:src="@{'/images/' + ${producto.imagen}}"
                         th:alt="${producto.nombre}">
                    <span th:if="${producto.imagen == null or producto.imagen.isEmpty()}"
                          class="product-img-placeholder">📦</span>
                </div>

                <!-- Tipo -->
                <div class="product-tipo" th:text="${producto.tipoProducto}"></div>

                <!-- Nombre -->
                <div class="product-nombre" th:text="${producto.nombre}"></div>

                <!-- Precio -->
                <div class="product-precio">
                    <span th:text="${#numbers.formatDecimal(producto.precio, 1, 2)}"></span>
                    <span>€</span>
                </div>

                <!-- Botones -->
                <div class="btn-acciones">
                    <a th:href="@{/productos/editar/{id}(id=${producto.id})}"
                       class="btn btn-editar btn-sm">✏️ Editar</a>
                    <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}"
                       class="btn btn-eliminar btn-sm">🗑 Eliminar</a>
                </div>

            </div>
        </div>
    </div>

    <!-- Mensaje si no hay productos -->
    <div th:if="${#lists.isEmpty(productos)}" class="text-center mt-5 py-5">
        <p class="fs-4 text-muted">😶 No hay productos todavía.</p>
        <a href="/productos/nuevo" class="btn btn-agregar mt-2">Agregar el primero</a>
    </div>

</div>

</body>
</html>
